<!DOCTYPE html>
<!--
  ============================================================
  CATATAN UANG HARIAN  -  aplikasi satu-file (HTML + CSS + JS)
  ============================================================
  Susunan dari atas ke bawah:
    1. <style> ...... semua TAMPILAN / warna / tata letak
    2. <body> ....... struktur layar (header, tombol, riwayat)
    3. <script> ..... OTAK / logika (simpan, hitung, render)
  Data disimpan di localStorage pada browser pengguna.
  ============================================================
-->
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Catatan Uang Harian</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- ===== PWA: bisa dipasang sebagai ikon layar utama & dibuka offline ===== -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F2EBDD" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1A1814" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Catatan Uang">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
:root{
    --bg:#F2EBDD; --surface:#FFFFFF; --surface-2:#FBF7EF;
    --ink:#2B2722; --ink-soft:#6E665B; --ink-faint:#A39A8B;
    --line:rgba(43,39,34,.10); --line-2:rgba(43,39,34,.18);
    --green:#1C7A52; --green-bg:#E4F1E9; --green-ink:#14593C;
    --red:#BE4630; --red-bg:#F8E7E1; --red-ink:#94321F;
    --gold:#C2872A;
    --amber-bg:#FBEEDA; --amber-ink:#8A5A12; --amber-line:rgba(194,135,42,.35);
    --r-md:12px; --r-lg:18px; --r-xl:26px;
    --shadow:0 8px 30px rgba(43,39,34,.08);
  }
  /* ===== Mode gelap (dark mode) ===== */
  :root[data-theme="dark"]{
    --bg:#1A1814; --surface:#252119; --surface-2:#201D16;
    --ink:#F1EADC; --ink-soft:#B3A893; --ink-faint:#7C725F;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
    --green:#36A873; --green-bg:rgba(54,168,115,.16); --green-ink:#7BD8AE;
    --red:#D85F45; --red-bg:rgba(216,95,69,.18); --red-ink:#F0A18F;
    --gold:#D6A23F;
    --amber-bg:rgba(214,162,63,.16); --amber-ink:#E7BE7A; --amber-line:rgba(214,162,63,.35);
    --shadow:0 8px 30px rgba(0,0,0,.45);
  }
  body, .hero, .scard, .row, .act, .sheet, .icon-btn, .data-btn,
  .field input, .amount-wrap, .report-link{
    transition:background-color .25s ease, color .25s ease, border-color .25s ease;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:'Plus Jakarta Sans',sans-serif; color:var(--ink);
    background:var(--bg); line-height:1.5;
    min-height:100vh; display:flex; justify-content:center;
  }
  .app{
    width:100%; max-width:440px; min-height:100vh; background:var(--bg);
    display:flex; flex-direction:column; position:relative;
  }
  @media(min-width:520px){
    body{align-items:flex-start; padding:24px 0;}
    .app{min-height:auto; border-radius:var(--r-xl); box-shadow:var(--shadow); overflow:hidden; min-height:90vh;}
  }

  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 20px 8px;
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .brand .logo{
    width:38px; height:38px; border-radius:11px; background:var(--gold);
    display:flex; align-items:center; justify-content:center; color:#fff;
  }
  .brand h1{
    font-family:'Baloo 2',cursive; font-weight:600; font-size:19px;
    margin:0; letter-spacing:-.01em; line-height:1.1;
  }
  .icon-btn{
    width:42px; height:42px; border:none; background:var(--surface);
    border:1px solid var(--line); border-radius:12px; color:var(--ink-soft);
    display:flex; align-items:center; justify-content:center; cursor:pointer;
    transition:background .15s;
  }
  .icon-btn:active{background:var(--surface-2);}

  main{flex:1; padding:8px 20px 28px; display:flex; flex-direction:column; gap:16px;}

  /* hero */
  .hero{
    background:var(--surface); border-radius:var(--r-xl); padding:18px 20px 20px;
    border:1px solid var(--line); box-shadow:var(--shadow);
  }
  .month-nav{display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:14px;}
  .month-nav button{
    width:34px; height:34px; border:none; background:transparent; color:var(--ink-soft);
    border-radius:10px; cursor:pointer; font-size:20px; line-height:1;
  }
  .month-nav button:disabled{opacity:.25; cursor:default;}
  .month-nav button:not(:disabled):active{background:var(--surface-2);}
  .month-nav .label{font-weight:600; font-size:15px; min-width:130px; text-align:center;}
  .saldo-label{font-size:13px; color:var(--ink-soft); margin:0;}
  .saldo{font-family:'Baloo 2',cursive; font-weight:600; font-size:38px; margin:2px 0 10px; letter-spacing:-.02em; line-height:1;}
  .badge{
    display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600;
    padding:5px 11px; border-radius:999px;
  }
  .badge.up{background:var(--green-bg); color:var(--green-ink);}
  .badge.down{background:var(--red-bg); color:var(--red-ink);}

  /* action buttons */
  .actions{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .act{
    border:none; cursor:pointer; border-radius:var(--r-lg); padding:18px 12px;
    display:flex; flex-direction:column; align-items:center; gap:8px; color:#fff;
    font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:15px;
    transition:transform .1s, filter .15s;
  }
  .act:active{transform:scale(.97);}
  .act.masuk{background:var(--green);}
  .act.keluar{background:var(--red);}
  .act .circle{
    width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.22);
    display:flex; align-items:center; justify-content:center; font-size:26px; line-height:1; font-weight:600;
  }

  /* summary cards */
  .summary{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .scard{background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:13px 15px;}
  .scard .lbl{font-size:12px; color:var(--ink-soft); margin:0 0 3px;}
  .scard .val{font-weight:700; font-size:17px; margin:0;}
  .scard .val.green{color:var(--green);}
  .scard .val.red{color:var(--red);}

  /* riwayat */
  .riwayat-title{font-weight:600; font-size:14px; color:var(--ink-soft); margin:4px 2px 2px;}
  .day-group{margin-top:10px;}
  .day-head{font-weight:600; font-size:13px; color:var(--ink-faint); margin:0 2px 8px; display:flex; justify-content:space-between;}
  .row{
    display:flex; align-items:center; gap:12px; background:var(--surface);
    border:1px solid var(--line); border-radius:var(--r-md); padding:11px 13px; margin-bottom:8px;
    cursor:pointer; transition:background .12s;
  }
  .row:active{background:var(--surface-2);}
  .row .dot{
    width:36px; height:36px; border-radius:50%; flex-shrink:0; font-weight:700; font-size:18px;
    display:flex; align-items:center; justify-content:center;
  }
  .row .dot.masuk{background:var(--green-bg); color:var(--green-ink);}
  .row .dot.keluar{background:var(--red-bg); color:var(--red-ink);}
  .row .meta{flex:1; min-width:0;}
  .row .meta .nm{font-weight:600; font-size:14.5px; margin:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .row .meta .sub{font-size:11.5px; color:var(--ink-faint); margin:0;}
  .row .amt{font-weight:700; font-size:14.5px; white-space:nowrap;}
  .row .amt.green{color:var(--green);}
  .row .amt.red{color:var(--red);}

  .empty{text-align:center; color:var(--ink-faint); padding:34px 16px; font-size:14px;}
  .empty .big{font-size:40px; margin-bottom:6px;}

  .report-link{
    margin-top:6px; width:100%; border:1px dashed var(--line-2); background:transparent;
    color:var(--ink-soft); border-radius:var(--r-md); padding:14px; font-size:14px; font-weight:600;
    cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .report-link:active{background:var(--surface);}

  /* overlays */
  .overlay{
    position:fixed; inset:0; background:rgba(43,39,34,.45); z-index:50;
    display:none; align-items:flex-end; justify-content:center;
  }
  .overlay.open{display:flex;}
  @media(min-width:520px){.overlay{align-items:center;}}
  .sheet{
    width:100%; max-width:440px; background:var(--bg); border-radius:var(--r-xl) var(--r-xl) 0 0;
    padding:22px 20px calc(22px + env(safe-area-inset-bottom)); max-height:92vh; overflow-y:auto;
    animation:slideUp .22s ease;
  }
  @media(min-width:520px){.sheet{border-radius:var(--r-xl); max-height:88vh;}}
  @keyframes slideUp{from{transform:translateY(40px); opacity:.6;} to{transform:translateY(0); opacity:1;}}
  .sheet-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .sheet-head h2{font-family:'Baloo 2',cursive; font-weight:600; font-size:20px; margin:0;}
  .sheet-head h2.green{color:var(--green);}
  .sheet-head h2.red{color:var(--red);}
  .close-x{border:none; background:var(--surface); border:1px solid var(--line); border-radius:10px; width:38px; height:38px; font-size:20px; color:var(--ink-soft); cursor:pointer; line-height:1;}

  .field{margin-bottom:16px;}
  .field label{display:block; font-size:13px; font-weight:600; color:var(--ink-soft); margin-bottom:7px;}
  .field input{
    width:100%; border:1px solid var(--line-2); background:var(--surface); border-radius:12px;
    padding:13px 14px; font-size:16px; font-family:'Plus Jakarta Sans',sans-serif; color:var(--ink); outline:none;
  }
  .field input:focus{border-color:var(--gold);}
  .amount-wrap{display:flex; align-items:center; border:1px solid var(--line-2); background:var(--surface); border-radius:14px; padding:6px 16px;}
  .amount-wrap:focus-within{border-color:var(--gold);}
  .amount-wrap .rp{font-weight:700; font-size:22px; color:var(--ink-soft); margin-right:6px;}
  .amount-wrap input{border:none; background:transparent; padding:10px 0; font-size:30px; font-weight:700; font-family:'Baloo 2',cursive; width:100%; outline:none; color:var(--ink);}
  .btn-primary{
    width:100%; border:none; color:#fff; border-radius:14px; padding:16px; font-size:16px; font-weight:700;
    cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; margin-top:4px;
  }
  .btn-primary.green{background:var(--green);}
  .btn-primary.red{background:var(--red);}
  .btn-ghost{width:100%; border:1px solid var(--line-2); background:transparent; color:var(--ink-soft); border-radius:14px; padding:13px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; margin-top:10px;}
  .btn-danger-text{width:100%; border:none; background:transparent; color:var(--red); font-size:14px; font-weight:600; cursor:pointer; padding:14px; margin-top:4px;}

  .settings-block{background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:6px 16px 16px; margin-bottom:16px;}
  .settings-block h3{font-size:13px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em; margin:16px 0 4px;}
  .theme-seg{display:grid; grid-template-columns:repeat(3,1fr); gap:6px; background:var(--surface); border:1px solid var(--line); border-radius:14px; padding:5px;}
  .theme-seg button{border:none; background:transparent; color:var(--ink-soft); font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:12.5px; line-height:1.2; padding:11px 4px; border-radius:10px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:6px; transition:background .15s, color .15s;}
  .theme-seg button.active{background:var(--gold); color:#fff;}
  .data-btn{display:flex; align-items:center; gap:10px; width:100%; border:none; background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:14px; font-size:14.5px; font-weight:600; color:var(--ink); cursor:pointer; font-family:'Plus Jakarta Sans',sans-serif; margin-bottom:10px; text-align:left;}
  .data-btn:active{background:var(--surface-2);}
  .data-btn .ic{width:30px; height:30px; border-radius:8px; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:17px;}

  /* laporan */
  .lap-meta{font-size:13px; color:var(--ink-soft); margin-bottom:14px;}
  .lap-meta b{color:var(--ink);}
  .lap-totals{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
  .lap-totals .scard .val{font-size:16px;}
  .lap-net{background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); padding:14px 16px; display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .lap-net .v{font-family:'Baloo 2',cursive; font-weight:600; font-size:20px;}
  .lap-table{width:100%; border-collapse:collapse; font-size:13px;}
  .lap-table th{text-align:left; color:var(--ink-faint); font-weight:600; padding:6px 4px; border-bottom:1px solid var(--line);}
  .lap-table td{padding:8px 4px; border-bottom:1px solid var(--line);}
  .lap-table td.r{text-align:right; font-weight:600; white-space:nowrap;}

  @media print{
    body{background:#fff; display:block; padding:0;}
    .app{display:none;}
    .overlay{position:static; background:#fff; display:none;}
    .overlay.open{display:block;}
    .sheet{box-shadow:none; max-height:none; animation:none; border-radius:0; max-width:100%; padding:0;}
    .close-x, .lap-print-btn{display:none !important;}
  }
  /* ===== Dompet (Tunai / Transfer) ===== */
  .wallets{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px;}
  .wallet{display:flex; align-items:center; gap:10px; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r-md); padding:11px 12px;}
  .wal-ic{width:34px; height:34px; border-radius:9px; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .wal-ic.cash{background:var(--green-bg); color:var(--green-ink);}
  .wal-ic.tf{background:var(--amber-bg); color:var(--amber-ink);}
  .wal-lbl{margin:0; font-size:12px; color:var(--ink-soft);}
  .wal-val{margin:0; font-size:15px; font-weight:700; color:var(--ink);}
  /* ===== Pilihan (metode / status) ===== */
  .seg{display:grid; grid-auto-flow:column; grid-auto-columns:1fr; gap:8px;}
  .seg button{border:1px solid var(--line-2); background:var(--surface); color:var(--ink-soft); font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:14px; padding:13px 8px; border-radius:12px; cursor:pointer; transition:background .15s, color .15s, border-color .15s;}
  .seg button.active{background:var(--gold); color:#fff; border-color:var(--gold);}
  .btn-primary.disabled, .btn-primary:disabled{opacity:.45; cursor:not-allowed;}
  /* ===== Pengingat transfer menunggu ===== */
  .pending{background:var(--amber-bg); border:1px solid var(--amber-line); border-radius:var(--r-lg); padding:14px 15px; margin-bottom:16px;}
  .pending-title{margin:0 0 3px; font-size:14px; font-weight:700; color:var(--amber-ink);}
  .pending-note{margin:0 0 4px; font-size:12px; color:var(--amber-ink); opacity:.85;}
  .pending-item{display:flex; align-items:center; gap:10px; background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md); padding:10px 12px; margin-top:8px;}
  .pi-info{flex:1; min-width:0;}
  .pi-nm{margin:0; font-size:14px; font-weight:600; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pi-sub{margin:0; font-size:12px; color:var(--ink-soft);}
  .pi-act{display:flex; flex-direction:column; gap:6px; flex-shrink:0;}
  .pi-ok{border:none; background:var(--green); color:#fff; font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:12.5px; padding:8px 12px; border-radius:9px; cursor:pointer;}
  .pi-cancel{border:none; background:transparent; color:var(--ink-faint); font-family:'Plus Jakarta Sans',sans-serif; font-weight:600; font-size:12px; padding:2px; cursor:pointer;}
  .dot.wait{background:var(--amber-bg); color:var(--amber-ink);}
  .amt.wait{color:var(--amber-ink);}
  .wait-tag{color:var(--amber-ink); font-weight:600;}
</style>

</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <div class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M3 7h18M3 7l2 12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2l2-12M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
      </div>
      <h1>Catatan Uang<br>Harian</h1>
    </div>
    <button class="icon-btn" onclick="openSettings()" aria-label="Pengaturan">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </header>

  <main>
    <div id="pendingBox"></div>

    <section class="hero">
      <div class="month-nav">
        <button id="prevMonth" onclick="changeMonth(-1)" aria-label="Bulan sebelumnya">&#8249;</button>
        <span class="label" id="monthLabel">—</span>
        <button id="nextMonth" onclick="changeMonth(1)" aria-label="Bulan berikutnya">&#8250;</button>
      </div>
      <p class="saldo-label">Total uang sekarang</p>
      <p class="saldo" id="saldo">Rp 0</p>
      <span class="badge up" id="netBadge">Bulan ini Rp 0</span>
      <div class="wallets">
        <div class="wallet">
          <div class="wal-ic cash"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/></svg></div>
          <div><p class="wal-lbl">Tunai</p><p class="wal-val" id="saldoCash">Rp 0</p></div>
        </div>
        <div class="wallet">
          <div class="wal-ic tf"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M7 10h11l-3-3M17 14H6l3 3"/></svg></div>
          <div><p class="wal-lbl">Transfer</p><p class="wal-val" id="saldoTransfer">Rp 0</p></div>
        </div>
      </div>
    </section>

    <div class="actions">
      <button class="act masuk" onclick="openForm('masuk')">
        <span class="circle">+</span>
        Uang masuk
      </button>
      <button class="act keluar" onclick="openForm('keluar')">
        <span class="circle">&minus;</span>
        Uang keluar
      </button>
    </div>

    <div class="summary">
      <div class="scard"><p class="lbl" id="lblMasuk">Masuk bulan ini</p><p class="val green" id="sumMasuk">Rp 0</p></div>
      <div class="scard"><p class="lbl" id="lblKeluar">Keluar bulan ini</p><p class="val red" id="sumKeluar">Rp 0</p></div>
    </div>

    <div>
      <p class="riwayat-title">Riwayat</p>
      <div id="riwayat"></div>
    </div>

    <button class="report-link" onclick="openLaporan()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg>
      Lihat laporan &amp; cetak / simpan PDF
    </button>
  </main>
</div>

<!-- FORM CATAT -->
<div class="overlay" id="formOverlay">
  <div class="sheet">
    <div class="sheet-head">
      <h2 id="formTitle">Catat uang</h2>
      <button class="close-x" onclick="closeOverlay('formOverlay')">&times;</button>
    </div>
    <div class="field">
      <label>Jumlah</label>
      <div class="amount-wrap"><span class="rp">Rp</span><input id="fJumlah" type="text" inputmode="numeric" placeholder="0" autocomplete="off"></div>
    </div>
    <div class="field">
      <label>Catatan</label>
      <input id="fCatatan" type="text" placeholder="Contoh: jualan nasi" autocomplete="off">
    </div>
    <div class="field">
      <label>Tanggal</label>
      <input id="fTanggal" type="date">
    </div>
    <div class="field">
      <label>Metode</label>
      <div class="seg" id="metodeSeg">
        <button type="button" data-metode="cash" onclick="setMetode('cash')">Tunai</button>
        <button type="button" data-metode="transfer" onclick="setMetode('transfer')">Transfer</button>
      </div>
    </div>
    <div class="field" id="statusRow" style="display:none">
      <label>Uang transfernya sudah masuk?</label>
      <div class="seg" id="statusSeg">
        <button type="button" data-status="masuk" onclick="setStatus('masuk')">Sudah masuk</button>
        <button type="button" data-status="menunggu" onclick="setStatus('menunggu')">Belum masuk</button>
      </div>
    </div>
    <button class="btn-primary green" id="fSimpan" onclick="submitForm()">Simpan</button>
    <button class="btn-danger-text" id="fHapus" style="display:none" onclick="deleteCurrent()">Hapus catatan ini</button>
  </div>
</div>

<!-- PENGATURAN -->
<div class="overlay" id="settingsOverlay">
  <div class="sheet">
    <div class="sheet-head">
      <h2>Pengaturan</h2>
      <button class="close-x" onclick="closeOverlay('settingsOverlay')">&times;</button>
    </div>
    <div class="settings-block">
      <h3>Identitas</h3>
      <div class="field" style="margin-bottom:10px;"><label>Nama pemilik</label><input id="sNama" type="text" placeholder="Contoh: Warung Bu Ani"></div>
      <div class="field" style="margin-bottom:4px;"><label>Lokasi / Kabupaten</label><input id="sLokasi" type="text" placeholder="Contoh: Jayapura"></div>
    </div>
    <button class="btn-primary green" onclick="saveSettings()">Simpan pengaturan</button>

    <h3 style="font-size:13px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em; margin:22px 0 10px;">Tampilan</h3>
    <div class="theme-seg" id="themeSeg">
      <button data-tema="terang" onclick="setTema('terang')">
        <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></span>
        Terang
      </button>
      <button data-tema="gelap" onclick="setTema('gelap')">
        <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></span>
        Gelap
      </button>
      <button data-tema="auto" onclick="setTema('auto')">
        <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2.5"/><path d="M12 18h.01"/></svg></span>
        Ikuti perangkat
      </button>
    </div>

    <h3 style="font-size:13px; font-weight:700; color:var(--ink-faint); text-transform:uppercase; letter-spacing:.04em; margin:22px 0 10px;">Data</h3>
    <button class="data-btn" onclick="backupData()"><span class="ic">&#8595;</span>Cadangkan data (unduh file)</button>
    <button class="data-btn" onclick="document.getElementById('restoreInput').click()"><span class="ic">&#8593;</span>Pulihkan data dari file</button>
    <input id="restoreInput" type="file" accept="application/json,.json" style="display:none" onchange="restoreData(event)">
    <button class="btn-danger-text" onclick="resetData()">Hapus semua data</button>
  </div>
</div>

<!-- LAPORAN -->
<div class="overlay" id="laporanOverlay">
  <div class="sheet" id="laporanSheet">
    <div class="sheet-head">
      <h2 id="lapTitle">Laporan</h2>
      <button class="close-x" onclick="closeOverlay('laporanOverlay')">&times;</button>
    </div>
    <div id="lapBody"></div>
    <button class="btn-primary green lap-print-btn" style="margin-top:18px;" onclick="window.print()">Cetak / Simpan sebagai PDF</button>
  </div>
</div>

<script>
// ====== Penyimpanan ======
  const KEY = 'catatanKeuangan_v1';
  let state = load();
  let viewMonth = currentMonthKey();
  let editingId = null;
  let formJenis = 'masuk';
  let formMetode = null;   // 'cash' | 'transfer'
  let formStatus = null;   // 'masuk' | 'menunggu' (khusus transfer masuk)

  function load(){
    let st;
    try{ const raw = localStorage.getItem(KEY); if(raw) st = JSON.parse(raw); }catch(e){}
    if(!st || typeof st!=='object') st = { config:{ nama:'', lokasi:'' }, entries:[] };
    if(!st.config) st.config = { nama:'', lokasi:'' };
    if(!Array.isArray(st.entries)) st.entries = [];
    // Migrasi data lama: catatan tanpa metode dianggap Tunai & sudah masuk
    st.entries.forEach(function(e){
      if(!e.metode) e.metode = 'cash';
      if(!e.status) e.status = 'masuk';
    });
    return st;
  }
  function save(){ try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){} }

  // ====== Tanggal & format ======
  const BULAN=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const HARI=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  function pad(n){return String(n).padStart(2,'0');}
  function todayISO(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
  function nowTime(){const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());}
  function currentMonthKey(){const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1);}
  function monthOf(iso){return iso.slice(0,7);}
  function monthLabel(key){const[y,m]=key.split('-');return BULAN[+m-1]+' '+y;}
  function dayLabel(iso){
    if(iso===todayISO())return 'Hari ini';
    const[y,m,d]=iso.split('-').map(Number);
    return HARI[new Date(y,m-1,d).getDay()]+', '+d+' '+BULAN[m-1];
  }
  function formatRp(n){const sign=n<0?'−':'';return sign+'Rp '+Math.abs(Math.round(n)).toLocaleString('id-ID');}

  // ====== Hitungan ======
  // Sebuah catatan "dihitung" ke saldo kalau bukan transfer-masuk yang masih menunggu
  function isCounted(e){ if(e.jenis==='masuk' && e.metode==='transfer') return e.status==='masuk'; return true; }
  function saldoBy(metode){
    return state.entries.reduce((s,e)=>{
      if(e.metode!==metode || !isCounted(e)) return s;
      return s + (e.jenis==='masuk' ? e.jumlah : -e.jumlah);
    },0);
  }
  const saldoCash=()=>saldoBy('cash');
  const saldoTransfer=()=>saldoBy('transfer');
  const saldoTotal=()=>saldoCash()+saldoTransfer();
  const pendingList=()=>state.entries.filter(e=>e.jenis==='masuk' && e.metode==='transfer' && e.status==='menunggu');
  const monthEntries=k=>state.entries.filter(e=>monthOf(e.tgl)===k);
  const sumMasukCounted=arr=>arr.filter(e=>e.jenis==='masuk' && isCounted(e)).reduce((s,e)=>s+e.jumlah,0);
  const sumKeluar=arr=>arr.filter(e=>e.jenis==='keluar').reduce((s,e)=>s+e.jumlah,0);
  const metodeLabel=m=> m==='transfer' ? 'Transfer' : 'Tunai';

  // ====== Render utama ======
  function render(){
    document.getElementById('monthLabel').textContent = monthLabel(viewMonth);
    document.getElementById('saldo').textContent = formatRp(saldoTotal());
    document.getElementById('saldoCash').textContent = formatRp(saldoCash());
    document.getElementById('saldoTransfer').textContent = formatRp(saldoTransfer());

    const me = monthEntries(viewMonth);
    const masuk = sumMasukCounted(me), keluar = sumKeluar(me);
    const net = masuk - keluar;
    const badge = document.getElementById('netBadge');
    badge.className = 'badge ' + (net<0?'down':'up');
    badge.textContent = 'Bulan ini ' + (net>=0?'+':'') + formatRp(net) + (net<0?' (lebih banyak keluar)':'');

    document.getElementById('sumMasuk').textContent = formatRp(masuk);
    document.getElementById('sumKeluar').textContent = formatRp(keluar);

    document.getElementById('prevMonth').disabled = false;
    document.getElementById('nextMonth').disabled = (viewMonth >= currentMonthKey());

    renderPending();
    renderRiwayat(me);
    save();
  }

  function renderPending(){
    const box = document.getElementById('pendingBox');
    const list = pendingList().slice().sort((a,b)=>(a.tgl+a.waktu).localeCompare(b.tgl+b.waktu));
    if(list.length===0){ box.innerHTML=''; return; }
    let h = '<div class="pending"><p class="pending-title">Transfer menunggu masuk ('+list.length+')</p>';
    h += '<p class="pending-note">Belum dihitung ke saldo. Cek dulu, kalau uangnya sudah masuk tekan tombolnya.</p>';
    list.forEach(e=>{
      h += '<div class="pending-item">'
        + '<div class="pi-info"><p class="pi-nm">'+escapeHtml(e.catatan||'Transfer')+'</p>'
        + '<p class="pi-sub">'+formatRp(e.jumlah)+' &middot; '+dayLabel(e.tgl)+'</p></div>'
        + '<div class="pi-act">'
        + '<button class="pi-ok" onclick="confirmPending('+e.id+')">Sudah masuk</button>'
        + '<button class="pi-cancel" onclick="cancelPending('+e.id+')">Batalkan</button>'
        + '</div></div>';
    });
    h += '</div>';
    box.innerHTML = h;
  }

  function renderRiwayat(entries){
    const box = document.getElementById('riwayat');
    if(entries.length===0){
      box.innerHTML = '<div class="empty"><div class="big">&#128221;</div>Belum ada catatan bulan ini.<br>Tekan tombol hijau atau merah untuk mulai.</div>';
      return;
    }
    const sorted = entries.slice().sort((a,b)=>(b.tgl+b.waktu).localeCompare(a.tgl+a.waktu));
    const groups = {};
    sorted.forEach(e=>{ (groups[e.tgl]=groups[e.tgl]||[]).push(e); });
    let html='';
    Object.keys(groups).sort().reverse().forEach(tgl=>{
      const items = groups[tgl];
      const dayNet = items.reduce((s,e)=> s + (isCounted(e) ? (e.jenis==='masuk'?e.jumlah:-e.jumlah) : 0), 0);
      html += '<div class="day-group"><div class="day-head"><span>'+dayLabel(tgl)+'</span><span>'+(dayNet>=0?'+':'')+formatRp(dayNet)+'</span></div>';
      items.forEach(e=>{
        const masuk = e.jenis==='masuk';
        const wait = masuk && e.metode==='transfer' && e.status==='menunggu';
        const sub = metodeLabel(e.metode)+' &middot; '+e.waktu + (wait?' &middot; <span class="wait-tag">menunggu</span>':'');
        const amtCls = wait ? 'wait' : (masuk?'green':'red');
        html += '<div class="row" onclick="openEdit('+e.id+')">'
          + '<div class="dot '+(wait?'wait':e.jenis)+'">'+(masuk?'+':'&minus;')+'</div>'
          + '<div class="meta"><p class="nm">'+escapeHtml(e.catatan||(masuk?'Uang masuk':'Uang keluar'))+'</p>'
          + '<p class="sub">'+sub+'</p></div>'
          + '<span class="amt '+amtCls+'">'+(masuk?'+':'&minus;')+formatRp(e.jumlah)+'</span></div>';
      });
      html += '</div>';
    });
    box.innerHTML = html;
  }
  function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

  // ====== Navigasi bulan ======
  function changeMonth(dir){
    let[y,m]=viewMonth.split('-').map(Number);
    m+=dir; if(m<1){m=12;y--;} if(m>12){m=1;y++;}
    viewMonth = y+'-'+pad(m);
    render();
  }

  // ====== Form catat ======
  const fJumlah=document.getElementById('fJumlah');
  fJumlah.addEventListener('input',()=>{
    const d=fJumlah.value.replace(/\D/g,'');
    fJumlah.value = d ? parseInt(d,10).toLocaleString('id-ID') : '';
    validateForm();
  });
  const parseJumlah=()=>parseInt(fJumlah.value.replace(/\D/g,'')||'0',10);

  function setMetode(m){ formMetode=m; if(m!=='transfer') formStatus=null; updateFormUI(); }
  function setStatus(s){ formStatus=s; updateFormUI(); }
  function needStatus(){ return formJenis==='masuk' && formMetode==='transfer'; }

  function updateFormUI(){
    document.querySelectorAll('#metodeSeg button').forEach(b=>b.classList.toggle('active', b.getAttribute('data-metode')===formMetode));
    document.getElementById('statusRow').style.display = needStatus() ? 'block' : 'none';
    document.querySelectorAll('#statusSeg button').forEach(b=>b.classList.toggle('active', b.getAttribute('data-status')===formStatus));
    validateForm();
  }
  function validateForm(){
    let ok = parseJumlah()>0 && !!formMetode;
    if(needStatus()) ok = ok && !!formStatus;
    const btn=document.getElementById('fSimpan');
    btn.disabled = !ok;
    btn.classList.toggle('disabled', !ok);
  }

  function openForm(jenis){
    formJenis=jenis; editingId=null; formMetode=null; formStatus=null;
    const masuk = jenis==='masuk';
    const t=document.getElementById('formTitle');
    t.textContent = masuk?'Catat uang masuk':'Catat uang keluar';
    t.className = masuk?'green':'red';
    fJumlah.value=''; document.getElementById('fCatatan').value='';
    document.getElementById('fCatatan').placeholder = masuk?'Contoh: jualan nasi':'Contoh: belanja bahan';
    document.getElementById('fTanggal').value = todayISO();
    const btn=document.getElementById('fSimpan');
    btn.textContent='Simpan'; btn.className='btn-primary '+(masuk?'green':'red');
    document.getElementById('fHapus').style.display='none';
    updateFormUI();
    openOverlay('formOverlay');
    setTimeout(()=>fJumlah.focus(),250);
  }

  function openEdit(id){
    const e=state.entries.find(x=>x.id===id); if(!e)return;
    formJenis=e.jenis; editingId=id; formMetode=e.metode||'cash';
    formStatus = (e.jenis==='masuk' && e.metode==='transfer') ? (e.status||'masuk') : null;
    const masuk=e.jenis==='masuk';
    const t=document.getElementById('formTitle');
    t.textContent='Ubah catatan'; t.className=masuk?'green':'red';
    fJumlah.value=e.jumlah.toLocaleString('id-ID');
    document.getElementById('fCatatan').value=e.catatan||'';
    document.getElementById('fTanggal').value=e.tgl;
    const btn=document.getElementById('fSimpan');
    btn.textContent='Simpan perubahan'; btn.className='btn-primary '+(masuk?'green':'red');
    document.getElementById('fHapus').style.display='block';
    updateFormUI();
    openOverlay('formOverlay');
  }

  function submitForm(){
    const jumlah=parseJumlah();
    if(jumlah<=0){ alert('Isi jumlah uangnya dulu ya.'); fJumlah.focus(); return; }
    if(!formMetode){ alert('Pilih dulu: Tunai atau Transfer.'); return; }
    if(needStatus() && !formStatus){ alert('Pilih dulu: transfernya sudah masuk atau belum.'); return; }
    const tgl=document.getElementById('fTanggal').value||todayISO();
    const catatan=document.getElementById('fCatatan').value.trim();
    const status = needStatus() ? formStatus : 'masuk';
    if(editingId){
      const e=state.entries.find(x=>x.id===editingId);
      if(e){ e.jumlah=jumlah; e.catatan=catatan; e.tgl=tgl; e.metode=formMetode; e.status=status; }
    }else{
      state.entries.push({ id:Date.now(), jenis:formJenis, jumlah:jumlah, catatan:catatan, tgl:tgl, waktu:nowTime(), metode:formMetode, status:status });
    }
    viewMonth = monthOf(tgl);
    closeOverlay('formOverlay');
    render();
  }

  function deleteCurrent(){
    if(!editingId)return;
    if(confirm('Hapus catatan ini?')){
      state.entries=state.entries.filter(x=>x.id!==editingId);
      closeOverlay('formOverlay');
      render();
    }
  }

  // ====== Transfer menunggu ======
  function confirmPending(id){
    const e=state.entries.find(x=>x.id===id);
    if(e){ e.status='masuk'; save(); render(); }
  }
  function cancelPending(id){
    if(confirm('Batalkan transfer ini? Catatannya akan dihapus.')){
      state.entries=state.entries.filter(x=>x.id!==id);
      save(); render();
    }
  }

  // ====== Pengaturan ======
  function openSettings(){
    document.getElementById('sNama').value=state.config.nama||'';
    document.getElementById('sLokasi').value=state.config.lokasi||'';
    updateThemeUI();
    openOverlay('settingsOverlay');
  }
  function saveSettings(){
    state.config.nama=document.getElementById('sNama').value.trim();
    state.config.lokasi=document.getElementById('sLokasi').value.trim();
    save(); closeOverlay('settingsOverlay');
  }

  // ====== Tampilan (mode terang/gelap) ======
  function systemDark(){ return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches; }
  function applyTheme(){
    const pref = state.config.tema || 'auto';
    const dark = pref==='gelap' || (pref==='auto' && systemDark());
    document.documentElement.setAttribute('data-theme', dark?'dark':'light');
  }
  function setTema(pref){
    state.config.tema = pref;
    save(); applyTheme(); updateThemeUI();
  }
  function updateThemeUI(){
    const pref = state.config.tema || 'auto';
    document.querySelectorAll('#themeSeg button').forEach(b=>{
      b.classList.toggle('active', b.getAttribute('data-tema')===pref);
    });
  }

  // ====== Cadangan data ======
  function backupData(){
    const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='catatan-uang-'+todayISO()+'.json';
    a.click(); URL.revokeObjectURL(url);
  }
  function restoreData(ev){
    const file=ev.target.files[0]; if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      try{
        const data=JSON.parse(reader.result);
        if(!data.entries) throw new Error('Format tidak sesuai');
        state=data; save(); render(); applyTheme();
        alert('Data berhasil dipulihkan.'); closeOverlay('settingsOverlay');
      }catch(e){ alert('File tidak bisa dibaca. Pastikan file cadangan yang benar.'); }
    };
    reader.readAsText(file); ev.target.value='';
  }
  function resetData(){
    if(confirm('Yakin hapus SEMUA catatan? Tindakan ini tidak bisa dibatalkan.') &&
       confirm('Sekali lagi: semua data akan hilang. Lanjutkan?')){
      state={ config:{nama:'',lokasi:'',tema:state.config.tema||'auto'}, entries:[] };
      save(); render(); applyTheme(); closeOverlay('settingsOverlay');
    }
  }

  // ====== Laporan ======
  function openLaporan(){
    const me=monthEntries(viewMonth);
    const masuk=sumMasukCounted(me), keluar=sumKeluar(me), net=masuk-keluar;
    document.getElementById('lapTitle').textContent='Laporan '+monthLabel(viewMonth);
    let body='';
    if(state.config.nama||state.config.lokasi){
      body+='<p class="lap-meta">';
      if(state.config.nama) body+='<b>'+escapeHtml(state.config.nama)+'</b>';
      if(state.config.lokasi) body+='<br>'+escapeHtml(state.config.lokasi);
      body+='</p>';
    }
    body+='<div class="lap-totals">'
      +'<div class="scard"><p class="lbl">Total masuk</p><p class="val green">'+formatRp(masuk)+'</p></div>'
      +'<div class="scard"><p class="lbl">Total keluar</p><p class="val red">'+formatRp(keluar)+'</p></div></div>';
    body+='<div class="lap-net"><span>'+(net>=0?'Sisa (lebih)':'Kurang (boncos)')+'</span><span class="v" style="color:'+(net>=0?'var(--green)':'var(--red)')+'">'+(net>=0?'+':'')+formatRp(net)+'</span></div>';

    if(me.length){
      const sorted=me.slice().sort((a,b)=>(a.tgl+a.waktu).localeCompare(b.tgl+b.waktu));
      body+='<table class="lap-table"><thead><tr><th>Tgl</th><th>Catatan</th><th style="text-align:right">Jumlah</th></tr></thead><tbody>';
      sorted.forEach(e=>{
        const d=e.tgl.split('-')[2];
        const wait = e.jenis==='masuk' && e.metode==='transfer' && e.status==='menunggu';
        const ket = escapeHtml(e.catatan||(e.jenis==='masuk'?'Uang masuk':'Uang keluar')) + ' ('+metodeLabel(e.metode)+(wait?', menunggu':'')+')';
        body+='<tr><td>'+d+'</td><td>'+ket
          +'</td><td class="r" style="color:'+(wait?'var(--amber-ink)':(e.jenis==='masuk'?'var(--green)':'var(--red)'))+'">'
          +(e.jenis==='masuk'?'+':'−')+formatRp(e.jumlah)+'</td></tr>';
      });
      body+='</tbody></table>';
    }else{
      body+='<p class="empty">Belum ada catatan bulan ini.</p>';
    }
    document.getElementById('lapBody').innerHTML=body;
    openOverlay('laporanOverlay');
  }

  // ====== Overlay helper ======
  function openOverlay(id){document.getElementById(id).classList.add('open');}
  function closeOverlay(id){document.getElementById(id).classList.remove('open');}
  document.querySelectorAll('.overlay').forEach(o=>{
    o.addEventListener('click',e=>{ if(e.target===o) o.classList.remove('open'); });
  });

  try { applyTheme(); } catch(e) {}
  try {
    if(window.matchMedia){
      var mq = window.matchMedia('(prefers-color-scheme: dark)');
      var onSysChange = function(){ if((state.config.tema||'auto')==='auto') applyTheme(); };
      if(mq.addEventListener) mq.addEventListener('change', onSysChange);
      else if(mq.addListener) mq.addListener(onSysChange);   // dukungan HP / iOS lama
    }
  } catch(e) {}
  render();
</script>
<script>
  /* Daftarkan service worker untuk mode offline.
     Catatan: hanya aktif saat dibuka lewat https (mis. Vercel) atau
     localhost — tidak aktif kalau file dibuka langsung (file://). */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () {});
    });
  }
</script>
</body>
